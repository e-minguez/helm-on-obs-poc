name: Release Helm chart

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint hello-world-helm-chart

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | helm registry login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Package chart
        run: helm package hello-world-helm-chart

      - name: Push chart to GHCR (OCI)
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          helm push hello-world-helm-chart-*.tgz "oci://ghcr.io/${owner_lc}/charts"

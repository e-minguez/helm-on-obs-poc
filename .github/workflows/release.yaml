name: Release Helm chart

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.ver }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version
        id: ver
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@ee4ca427a2f43b6a16632044ca514c076267da23 # v6.19.0
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/hello-world-go:${{ steps.ver.outputs.ver }}
            ghcr.io/${{ env.REPO_OWNER }}/hello-world-go:latest

  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Lint chart
        run: helm lint hello-world-helm-chart

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | helm registry login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Package chart
        run: helm package hello-world-helm-chart

      - name: Push chart to GHCR (OCI)
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          helm push hello-world-helm-chart-*.tgz "oci://ghcr.io/${owner_lc}/charts"

  mirror-to-obs:
    needs: publish
    uses: ./.github/workflows/obs-sync.yaml
    secrets:
      OBS_USER: ${{ secrets.OBS_USER }}
      OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}

  mirror-image-to-obs:
    needs: build-image
    uses: ./.github/workflows/obs-sync-image.yaml
    with:
      version: ${{ needs.build-image.outputs.version }}
    secrets:
      OBS_USER: ${{ secrets.OBS_USER }}
      OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
